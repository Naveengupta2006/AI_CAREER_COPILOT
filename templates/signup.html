{% extends "base.html" %}

        <h2>create account</h2>
        <p class="sub-text">
            Start your AI Career Jourey
        </p>
        <form method="POST" >

        <p class="switch-auth">

        </p>
        <p>
            Already have an account? <a href="/login">Log in here</a>.
        </p>
    </div>
</div>
{% endblock %}
